name: ytdash_flutter_claude
description: "Flutter YouTube Videos Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_performance: ^0.10.0+12

  # Authentication
  google_sign_in: ^6.2.2

  # State Management
  flutter_bloc: ^9.1.0
  bloc_concurrency: ^0.3.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Code Generation Annotations
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking
  http: ^1.3.0

  # UI
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  # Local Storage
  sqflite: ^2.4.2
  path: ^1.9.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Geocoding
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  injectable_generator: ^2.7.0
  build_runner: ^2.4.14
  freezed: ^3.0.6
  json_serializable: ^6.9.4

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
